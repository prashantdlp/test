<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">  
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Blog preview card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <img src="./assets/images/illustration-article.svg" alt="image" style="border-radius: 10px; width: 100%;"/>

    <div class="tag">
      Learning
    </div>
   
    <p style="font-size: 11px; font-weight: 500;">Published 21 Dec 2023</p>
   
    <h3>HTML & CSS foundations</h3>
   
    <p style="font-size: 14px; font-weight: 500; color:gray">
      These languages are the backbone of every <br/>
      website, defining structure, content, and <br/>
      presentation.
    </p>
   
    <div style="display: flex; align-items: center; gap: 10px;">
      <img src="./assets/images/image-avatar.webp" alt="profile" width="32" height="32" style="border-radius: 32px;"/>
      <p style="color:black; font-weight: 950; font-size:14px;"> Greg Hooper </p>

  </div>
