<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">  <title>Frontend Mentor | Social links profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <img src="./assets/images/avatar-jessica.jpeg" alt="image" width="64px" height="64px" style="border-radius:32px;"/>
    
    <div style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
      <p style="font-weight: 700;">Jessica Randall</p>
      <p style="font-size: 9px; color: hsl(75, 94%, 57%); font-weight: 600;">London, United Kingdom</p>
    </div>  
    
    <p style="font-size: 11px; color:hsl(0, 0%, 50%); font-weight: 400;">"Front-end developer and avid reader."</p>

    <div style="font-size: 9px; font-weight:700; display: flex; flex-direction: column; justify-content: center; align-items: center; gap:10px;">
      <div class="button">GitHub</div>
      <div class="button">Frontend Mentor</div>
      <div class="button">LinkedIn</div>
      <div class="button">Twitter</div>
      <div class="button">Instagram</div>
    </div>
  </div>
</body>
</html>
