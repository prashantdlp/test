<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Mentor | Time tracking dashboard</title>
  <style>
    :root {
      /* Colors */
      --blue: hsl(246, 80%, 60%);
      --dark-blue: hsl(235, 46%, 20%);
      --very-dark-blue: hsl(226, 43%, 10%);
      --desaturated-blue: hsl(235, 45%, 61%);
      --pale-blue: hsl(236, 100%, 87%);
      
      /* Category Colors */
      --work: hsl(15, 100%, 70%);
      --play: hsl(195, 74%, 62%);
      --study: hsl(348, 100%, 68%);
      --exercise: hsl(145, 58%, 55%);
      --social: hsl(264, 64%, 52%);
      --self-care: hsl(43, 84%, 65%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rubik', sans-serif;
      background-color: var(--very-dark-blue);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    /* Grid Container */
    .dashboard-grid {
      display: grid;
      gap: 1.5rem;
      max-width: 1000px;
      width: 100%;
      grid-template-columns: 1fr; /* Mobile: 1 column */
    }

    /* Desktop Grid Logic */
    @media (min-width: 800px) {
      .dashboard-grid {
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(2, 1fr);
      }
      .profile-card { grid-row: span 2; }
    }

    /* Profile Card */
    .profile-card {
      background-color: var(--dark-blue);
      border-radius: 15px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .profile-top {
      background-color: var(--blue);
      padding: 2rem;
      border-radius: 15px;
      flex-grow: 1;
    }

    .profile-top img {
      width: 70px;
      border: 3px solid white;
      border-radius: 50%;
      margin-bottom: 2rem;
    }

    .profile-top p { color: var(--pale-blue); font-size: 0.9rem; }
    .profile-top h1 { font-weight: 300; font-size: 2.5rem; margin-top: 0.5rem; }

    .time-nav {
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .time-nav span {
      color: var(--desaturated-blue);
      cursor: pointer;
      transition: 0.3s;
    }

    .time-nav span.active, .time-nav span:hover { color: white; }

    /* Category Cards */
    .card {
      border-radius: 15px;
      padding-top: 40px; /* Space for the icon background */
      position: relative;
      overflow: hidden;
    }

    .card-content {
      background-color: var(--dark-blue);
      padding: 2rem;
      border-radius: 15px;
      position: relative;
      z-index: 2;
      height: 100%;
      transition: background-color 0.3s;
      cursor: pointer;
    }

    .card-content:hover { background-color: #33397a; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .card-body h2 { font-size: 3rem; font-weight: 300; margin-bottom: 0.5rem; }
    .card-body p { color: var(--pale-blue); font-size: 0.9rem; }

    /* Specific Card Colors */
    .work { background: var(--work); }
    .play { background: var(--play); }
    .study { background: var(--study); }
    .exercise { background: var(--exercise); }
    .social { background: var(--social); }
    .self-care { background: var(--self-care); }

    /* Mobile adjustments for card body */
    @media (max-width: 799px) {
      .card-body {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .card-body h2 { font-size: 2rem; margin-bottom: 0; }
      .time-nav { flex-direction: row; justify-content: space-between; }
    }
  </style>
</head>
<body>

  <main class="dashboard-grid">
    <section class="profile-card">
      <div class="profile-top">
        <img src="https://i.pravatar.cc/150?u=jeremy" alt="Jeremy Robson">
        <p>Report for</p>
        <h1>Jeremy Robson</h1>
      </div>
      <div class="time-nav">
        <span>Daily</span>
        <span class="active">Weekly</span>
        <span>Monthly</span>
      </div>
    </section>

    <article class="card work">
      <div class="card-content">
        <div class="card-header"><span>Work</span><img src="data:image/svg+xml,%3Csvg width='21' height='5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm9 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm9 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z' fill='%23BBC0FF' fill-rule='evenodd'/%3E%3C/svg%3E" alt="menu"></div>
        <div class="card-body">
          <h2>32hrs</h2>
          <p>Last Week - 36hrs</p>
        </div>
      </div>
    </article>

    <article class="card play">
      <div class="card-content">
        <div class="card-header"><span>Play</span><img src="data:image/svg+xml,%3Csvg width='21' height='5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm9 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm9 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z' fill='%23BBC0FF' fill-rule='evenodd'/%3E%3C/svg%3E" alt="menu"></div>
        <div class="card-body">
          <h2>10hrs</h2>
          <p>Last Week - 8hrs</p>
        </div>
      </div>
    </article>

    <article class="card study">
      <div class="card-content">
        <div class="card-header"><span>Study</span><img src="data:image/svg+xml,%3Csvg width='21' height='5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm9 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm9 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z' fill='%23BBC0FF' fill-rule='evenodd'/%3E%3C/svg%3E" alt="menu"></div>
        <div class="card-body">
          <h2>4hrs</h2>
          <p>Last Week - 7hrs</p>
        </div>
      </div>
    </article>

    <article class="card exercise">
      <div class="card-content">
        <div class="card-header"><span>Exercise</span><img src="data:image/svg+xml,%3Csvg width='21' height='5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm9 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm9 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z' fill='%23BBC0FF' fill-rule='evenodd'/%3E%3C/svg%3E" alt="menu"></div>
        <div class="card-body">
          <h2>4hrs</h2>
          <p>Last Week - 5hrs</p>
        </div>
      </div>
    </article>

    <article class="card social">
      <div class="card-content">
        <div class="card-header"><span>Social</span><img src="data:image/svg+xml,%3Csvg width='21' height='5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm9 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm9 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z' fill='%23BBC0FF' fill-rule='evenodd'/%3E%3C/svg%3E" alt="menu"></div>
        <div class="card-body">
          <h2>5hrs</h2>
          <p>Last Week - 10hrs</p>
        </div>
      </div>
    </article>

    <article class="card self-care">
      <div class="card-content">
        <div class="card-header"><span>Self Care</span><img src="data:image/svg+xml,%3Csvg width='21' height='5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm9 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm9 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z' fill='%23BBC0FF' fill-rule='evenodd'/%3E%3C/svg%3E" alt="menu"></div>
        <div class="card-body">
          <h2>2hrs</h2>
          <p>Last Week - 2hrs</p>
        </div>
      </div>
    </article>
  </main>

  <script>
    async function loadData(timeframe = 'weekly') {
      const response = await fetch('./data.json');
      const data = await response.json();

      data.forEach(category => {
        // 1. Find the card for this category (e.g., .work, .play)
        const className = category.title.toLowerCase().replace(' ', '-');
        const card = document.querySelector(`.${className}`);

        if (card) {
          const current = category.timeframes[timeframe].current;
          const previous = category.timeframes[timeframe].previous;

          // 2. Update the hours
          card.querySelector('h2').textContent = `${current}hrs`;
          
          // 3. Update the "Last Week" text
          const label = timeframe === 'daily' ? 'Yesterday' : timeframe === 'weekly' ? 'Last Week' : 'Last Month';
          card.querySelector('p').textContent = `${label} - ${previous}hrs`;
        }
      });
    }

    (() => {
      loadData();
    })();
  </script>
</body>
</html>
