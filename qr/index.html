<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | QR code component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background-color: hsl(212, 45%, 89%);
    }
  </style>
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution{ font-size: 15px; 
                  text-align: center; 
                }
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
  </style>
</head>
<body style="display: flex; justify-content:center ; align-items: center; height:100vh">
  <div class="attribution" style="background-color: hsl(0, 0%, 100%); width: 270px; border-radius: 20px; padding:10px">
    <img src="./images/image-qr-code.png" alt="QR" width="250" height="250" style="border-radius: 20px;"/>
    <p style="margin-top: 20px;font-weight: 700; color:hsl(218, 44%, 22%);">Improve your front-end skills by building projects</p>
    <p style="margin-top: 10px;font-weight: 400; font-size: 11px; color:hsl(216, 15%, 48%)">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
  </div>
</body>
</html>
